<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralMine</title><style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#0a0a0a,#000);
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* SMALL BUTTONS */
.tab{
  padding:6px 10px;
  font-size:12px;
  background:#111;
  border-radius:6px;
  cursor:pointer;
}

/* PROFILE ICON */
.profile{
  width:40px;
  height:40px;
  border-radius:50%;
  background:url('https://cdn.pixabay.com/photo/2023/05/29/09/59/ai-generated-8025127_1280.jpg') center/cover;
  cursor:pointer;
}

/* POPUP FORM */
.modal{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:300px;
  background:#111;
  padding:15px;
  border-radius:10px;
  display:none;
  z-index:10;
}

/* DASHBOARD */
.dashboard{
  position:fixed;
  top:0;
  left:0;
  width:80%;
  height:100%;
  background:#111;
  padding:15px;
  display:none;
}

/* BOT GRID */
.bot{
  margin:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

.bot img{
  width:100%;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  background:#00ffc3;
  border:none;
  margin-top:5px;
}

/* ANIMATION */
.bot:hover{
  transform:scale(1.03);
  transition:0.3s;
}
</style></head><body><div class="topbar">
  <div>
    <span class="tab" onclick="openModal()">Login</span>
    <span class="tab" onclick="openModal()">Register</span>
  </div>
  <div class="profile" onclick="toggleDashboard()"></div>
</div><!-- MODAL --><div class="modal" id="modal">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div><!-- DASHBOARD --><div class="dashboard" id="dashboard">
  <h3 id="username"></h3>
  <p>XP: <span id="xp">0</span></p>
  <p>Bots: <span id="botsOwned"></span></p>
  <p>Days Left: <span id="days"></span></p>
  <button onclick="withdraw()">Request Withdrawal</button>
  <button onclick="logout()">Logout</button>
</div><!-- BOTS --><div id="bots"><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/03/02/20/31/ai-7829021_1280.jpg">
<p>Standard Bot - $5</p>
<button onclick="buy(5,'Standard')">Buy</button>
</div><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/02/21/13/38/ai-7803074_1280.jpg">
<p>Bronze Bot - $15</p>
<button onclick="buy(15,'Bronze')">Buy</button>
</div><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/03/06/18/51/ai-7834081_1280.jpg">
<p>Silver Bot - $50</p>
<button onclick="buy(50,'Silver')">Buy</button>
</div><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/04/17/10/33/ai-generated-7930006_1280.jpg">
<p>Gold Bot - $100</p>
<button onclick="buy(100,'Gold')">Buy</button>
</div><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/05/22/17/14/ai-8010023_1280.jpg">
<p>Community I - $300</p>
<button onclick="buy(300,'Community I')">Buy</button>
</div><div class="bot">
<img src="https://cdn.pixabay.com/photo/2023/06/01/08/45/ai-8032663_1280.jpg">
<p>Community II - $500</p>
<button onclick="buy(500,'Community II')">Buy</button>
</div></div><script>
let user=null;
let xp=0;
let bots=[];
let startDate=null;

function openModal(){
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function register(){
  user=email.value;
  localStorage.setItem("user",user);
  login();
}

function login(){
  user=email.value;
  localStorage.setItem("user",user);
  closeModal();
  updateUI();
}

function logout(){
  localStorage.clear();
  location.reload();
}

function toggleDashboard(){
  let d=document.getElementById("dashboard");
  d.style.display = d.style.display==="block"?"none":"block";
}

function buy(amount,name){
  bots.push(name);
  xp+=amount*10;
  startDate=Date.now();
  updateUI();
}

function updateUI(){
  user=localStorage.getItem("user");
  if(user){
    document.getElementById("username").innerText=user;
    document.getElementById("xp").innerText=xp;
    document.getElementById("botsOwned").innerText=bots.join(",");
    if(startDate){
      let days=Math.floor((Date.now()-startDate)/(1000*60*60*24));
      document.getElementById("days").innerText=30-days;
    }
  }
}

function withdraw(){
  let daysPassed=Math.floor((Date.now()-startDate)/(1000*60*60*24));
  if(daysPassed<30){
    alert("Not yet eligible");
  }else{
    alert("Withdrawal requested");
  }
}

updateUI();
</script></body>
</html>
